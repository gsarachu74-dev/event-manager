<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>ProGest | Gestión de Proyectos</title>
    <link rel="stylesheet" href="css/style.css?v=4">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Jost:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Ionicons -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>

<body>
    <div id="app">
        <!-- Status Banner -->
        <div id="offline-banner" class="status-banner hidden">
            <ion-icon name="cloud-offline-outline"></ion-icon>
            <span>Estás sin conexión. Algunas funciones pueden estar limitadas.</span>
        </div>
        <!-- ==========================================================================
             AUTH VIEW
             ========================================================================== -->
        <section id="login-container" class="view hidden">
            <div class="login-card">
                <h1>Hola de nuevo</h1>
                <p>Ingresa a tu cuenta de ProGest</p>
                <form id="login-form">
                    <div class="input-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" required placeholder="tu@email.com">
                    </div>
                    <div class="input-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn btn-primary">Iniciar Sesión</button>
                    <p class="auth-switch">¿No tienes cuenta? <a href="#" id="go-to-signup">Regístrate</a></p>
                </form>
            </div>
        </section>

        <!-- ==========================================================================
             MAIN LAYOUT
             ========================================================================== -->
        <!-- Sidebar Navigation -->
        <aside class="sidebar view hidden">
            <div class="sidebar-header">
                <span class="logo">ProGest</span>
            </div>
            <nav class="sidebar-nav">
                <a href="#dashboard" class="nav-item">
                    <ion-icon name="grid-outline"></ion-icon>
                    <span>Dashboard</span>
                </a>
                <a href="#projects" class="nav-item">
                    <ion-icon name="folder-outline"></ion-icon>
                    <span>Proyectos</span>
                </a>
                <a href="#tasks" class="nav-item">
                    <ion-icon name="list-outline"></ion-icon>
                    <span>Tareas</span>
                </a>
                <a href="#costs" class="nav-item">
                    <ion-icon name="wallet-outline"></ion-icon>
                    <span>Costos</span>
                </a>
                <a href="#contacts" class="nav-item">
                    <ion-icon name="business-outline"></ion-icon>
                    <span>Contactos</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <button id="logout-btn" class="btn btn-text">
                    <ion-icon name="log-out-outline"></ion-icon>
                    <span>Cerrar Sesión</span>
                </button>
                <button id="install-pwa-btn" class="btn btn-primary hidden">
                    <ion-icon name="download-outline"></ion-icon>
                    <span>Instalar App</span>
                </button>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content view hidden">
            <header class="top-bar">
                <div id="view-title">Proyectos</div>
                <div class="user-profile">
                    <span id="user-name">Usuario</span>
                    <div class="avatar"></div>
                </div>
            </header>
            <div id="view-content" class="scrollable">
                <!-- Dynamic content loads here via app.js -->
            </div>
        </main>
    </div>

    <!-- ==========================================================================
         MODALS
         ========================================================================== -->

    <!-- Project Modal -->
    <div id="project-modal" class="modal hidden">
        <div class="modal-content">
            <h2 id="project-modal-title">Nuevo Proyecto</h2>
            <div class="input-group">
                <label>Nombre del Evento</label>
                <input type="text" id="project-name-input" placeholder="Ej. Boda de Ana & Juan" />
            </div>
            <div class="input-group">
                <label>Presupuesto Estimado</label>
                <input type="number" id="project-budget-input" placeholder="Ej. 15000" />
            </div>
            <div class="input-group">
                <label>Fecha del Evento</label>
                <input type="date" id="project-date-input" />
            </div>
            <div class="modal-actions">
                <button id="cancel-project-btn" type="button" class="btn btn-text">Cancelar</button>
                <button id="save-project-btn" type="button" class="btn btn-primary">Guardar</button>
            </div>
        </div>
    </div>

    <!-- Task Modal -->
    <div id="task-modal" class="modal hidden">
        <div class="modal-content">
            <h2 id="task-modal-title">Nueva Tarea</h2>
            <div class="input-group">
                <label>Nombre de la Tarea</label>
                <input type="text" id="task-name-input" placeholder="Ej. Confirmar catering" />
            </div>
            <div class="modal-actions">
                <button id="cancel-task-btn" class="btn btn-text">Cancelar</button>
                <button id="save-task-btn" class="btn btn-primary">Guardar</button>
            </div>
        </div>
    </div>

    <!-- Cost Modal -->
    <div id="cost-modal" class="modal hidden">
        <div class="modal-content">
            <h2 id="cost-modal-title">Nuevo Costo</h2>
            <div class="input-group">
                <label>Nombre del Costo</label>
                <input type="text" id="cost-name-input" placeholder="Ej. Fotógrafo" />
            </div>
            <div class="input-group">
                <label>Monto</label>
                <input type="number" id="cost-amount-input" placeholder="Ej. 800" />
            </div>
            <div class="input-group">
                <label>Categoría</label>
                <select id="cost-category-input">
                    <option value="Lugar">Lugar</option>
                    <option value="Comida">Comida</option>
                    <option value="Música">Música</option>
                    <option value="Fotografía">Fotografía</option>
                    <option value="Decoración">Decoración</option>
                    <option value="Transporte">Transporte</option>
                    <option value="Vestimenta">Vestimenta</option>
                    <option value="Otros" selected>Otros</option>
                </select>
            </div>
            <div class="modal-actions">
                <button id="cancel-cost-btn" type="button" class="btn btn-text">Cancelar</button>
                <button id="save-cost-btn" type="button" class="btn btn-primary">Guardar</button>
            </div>
        </div>
    </div>

    <!-- Contact Modal -->
    <div id="contact-modal" class="modal hidden">
        <div class="modal-content">
            <h2 id="contact-modal-title">Nuevo Contacto</h2>
            <div class="input-group">
                <label>Nombre Completo</label>
                <input type="text" id="contact-name-input" placeholder="Ej. Juan Pérez" />
            </div>
            <div class="input-group">
                <label>Servicio</label>
                <input type="text" id="contact-service-input" placeholder="Ej. Catering" />
            </div>
            <div class="input-group">
                <label>Teléfono</label>
                <input type="text" id="contact-phone-input" placeholder="Ej. +54 9 11..." />
            </div>
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="contact-email-input" placeholder="Ej. juan@catering.com" />
            </div>
            <div class="modal-actions">
                <button id="cancel-contact-btn" type="button" class="btn btn-text">Cancelar</button>
                <button id="save-contact-btn" type="button" class="btn btn-primary">Guardar</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="js/app.js"></script>
</body>

</html>
